<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Continental · Receipt Capture</title>
<style>
  :root {
    --bg:     #0a0b0f;
    --surface:#13161f;
    --card:   #1a1e2a;
    --accent: #3b7cf4;
    --accent2:#5de8c1;
    --warn:   #f4943b;
    --text:   #e8eaf0;
    --muted:  #5a6380;
    --ok:     #44d9a0;
    --err:    #f4504a;
    --r:      16px;
    --font:   -apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    overflow: hidden; /* no page scroll — app fills screen */
  }

  /* ── Full-screen app shell ── */
  .app {
    height: 100dvh;
    display: flex;
    flex-direction: column;
    max-width: 430px;   /* iPhone 15 Pro width */
    margin: 0 auto;
  }

  /* ── Header ── */
  header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px 10px;
    background: var(--surface);
    border-bottom: 1px solid rgba(255,255,255,.06);
    z-index: 10;
  }
  .logo {
    width: 30px; height: 30px; border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: grid; place-items: center; font-size: 15px; flex-shrink: 0;
  }
  .header-text h1 { font-size: 16px; font-weight: 700; line-height: 1.1; }
  .header-text span { font-size: 10px; color: var(--muted); font-weight: 500; }
  .set-btn {
    margin-left: auto;
    background: var(--card);
    border: 1px solid rgba(255,255,255,.1);
    color: var(--text);
    font-size: 13px; font-weight: 600;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    white-space: nowrap;
  }
  .set-btn:active { opacity: .7; }

  /* ── Camera viewport — portrait 3:4 fills remaining space ── */
  .camera-zone {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #000;
    /* clamp height so it doesn't overflow on wide screens */
    min-height: 0;
  }
  #videoFeed {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }
  #previewImg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    display: none;
  }
  #snapCanvas { display: none; }

  /* Countdown */
  .countdown-overlay {
    position: absolute; inset: 0; z-index: 3;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,.45);
    opacity: 0; pointer-events: none;
    transition: opacity .2s;
  }
  .countdown-overlay.active { opacity: 1; }
  .countdown-num {
    font-size: 96px; font-weight: 900; color: #fff;
    text-shadow: 0 4px 20px rgba(0,0,0,.6);
    font-variant-numeric: tabular-nums;
  }

  /* Flash */
  .flash-el {
    position: absolute; inset: 0; z-index: 4;
    background: #fff; opacity: 0; pointer-events: none;
    transition: opacity .04s;
  }
  .flash-el.pop { opacity: .75; }

  /* Status badge */
  .cam-badge {
    position: absolute; top: 12px; left: 12px; z-index: 5;
    font-size: 11px; font-weight: 700;
    padding: 4px 11px; border-radius: 20px;
    background: rgba(0,0,0,.55); color: var(--ok);
    pointer-events: none; letter-spacing: .04em;
  }
  .cam-badge.preview { background: rgba(59,124,244,.75); color: #fff; }

  /* Corner guides — receipt framing hints */
  .guide { position: absolute; z-index: 2; pointer-events: none; }
  .guide-tl { top: 28px; left: 28px; border-top: 3px solid rgba(255,255,255,.5); border-left: 3px solid rgba(255,255,255,.5); width: 28px; height: 28px; border-radius: 4px 0 0 0; }
  .guide-tr { top: 28px; right: 28px; border-top: 3px solid rgba(255,255,255,.5); border-right: 3px solid rgba(255,255,255,.5); width: 28px; height: 28px; border-radius: 0 4px 0 0; }
  .guide-bl { bottom: 28px; left: 28px; border-bottom: 3px solid rgba(255,255,255,.5); border-left: 3px solid rgba(255,255,255,.5); width: 28px; height: 28px; border-radius: 0 0 0 4px; }
  .guide-br { bottom: 28px; right: 28px; border-bottom: 3px solid rgba(255,255,255,.5); border-right: 3px solid rgba(255,255,255,.5); width: 28px; height: 28px; border-radius: 0 0 4px 0; }

  /* ── Bottom bar — three buttons in one row ── */
  .bottom-bar {
    flex-shrink: 0;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 12px;
    padding: 14px 20px 18px;
    background: var(--surface);
    border-top: 1px solid rgba(255,255,255,.06);
  }

  /* Side action buttons */
  .side-btn {
    padding: 12px 0;
    background: var(--card);
    border: 1px solid rgba(255,255,255,.1);
    color: var(--text);
    font-size: 14px; font-weight: 700;
    border-radius: 14px;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
    width: 100%;
  }
  .side-btn:active { transform: scale(.94); opacity: .7; }
  .side-btn:disabled { opacity: .22; cursor: not-allowed; transform: none; }
  #uploadBtn { background: var(--accent); border-color: transparent; color: #fff; }

  /* Shutter button — circle */
  .shutter-outer {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,.35);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    cursor: pointer;
    transition: transform .1s;
  }
  .shutter-outer:active { transform: scale(.91); }
  .shutter-outer:disabled { opacity: .3; cursor: not-allowed; }
  .shutter-inner {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: #fff;
    transition: background .15s, transform .1s;
  }
  .shutter-outer.counting .shutter-inner { background: var(--warn); }
  .shutter-outer:disabled .shutter-inner { background: rgba(255,255,255,.3); }

  /* ── History panel — scrollable below bottom bar ──
     Hidden on small phones to keep full-screen feel; shown when scrolled */
  .history-panel {
    position: fixed;
    bottom: -100%;
    left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 430px;
    max-height: 55dvh;
    background: var(--surface);
    border-top: 1px solid rgba(255,255,255,.1);
    border-radius: 20px 20px 0 0;
    transition: bottom .35s cubic-bezier(.32,.72,0,1);
    z-index: 20;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .history-panel.open { bottom: 0; }
  .history-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: rgba(255,255,255,.2);
    margin: 10px auto 0;
    flex-shrink: 0;
  }
  .history-title {
    font-size: 13px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: .08em;
    padding: 10px 16px 8px;
    flex-shrink: 0;
    display: flex; justify-content: space-between; align-items: center;
  }
  .history-close {
    background: none; border: none; color: var(--muted);
    font-size: 18px; cursor: pointer; padding: 0 4px;
  }
  .history-scroll { overflow-y: auto; padding: 0 12px 16px; }
  .hist-item {
    background: var(--card);
    border-radius: 12px;
    padding: 10px 12px;
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; margin-bottom: 8px;
    border: 1px solid rgba(255,255,255,.06);
  }
  .hist-icon { font-size: 20px; flex-shrink: 0; }
  .hist-info { flex: 1; overflow: hidden; }
  .hist-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hist-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .hist-badge { font-size: 10px; font-weight: 700; padding: 3px 7px; border-radius: 6px; flex-shrink: 0; }
  .hist-badge.ok  { background: rgba(68,217,160,.15); color: var(--ok); }
  .hist-badge.err { background: rgba(244,80,74,.15);  color: var(--err); }

  /* History open indicator in bottom bar */
  .hist-count {
    position: absolute; top: -4px; right: -4px;
    background: var(--accent); color: #fff;
    font-size: 10px; font-weight: 700;
    width: 18px; height: 18px; border-radius: 50%;
    display: none; align-items: center; justify-content: center;
  }
  .hist-count.show { display: flex; }
  .history-trigger {
    position: fixed; bottom: 110px; right: 16px;
    background: var(--card);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 50%; width: 42px; height: 42px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; cursor: pointer; z-index: 15;
    box-shadow: 0 4px 16px rgba(0,0,0,.4);
    transition: transform .1s;
    max-width: 430px;
  }
  .history-trigger:active { transform: scale(.92); }

  /* ── Settings popup ── */
  .settings-overlay {
    position: fixed; inset: 0; z-index: 30;
    background: rgba(0,0,0,.6);
    display: none; align-items: flex-end; justify-content: center;
  }
  .settings-overlay.open { display: flex; }
  .settings-sheet {
    width: 100%; max-width: 430px;
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 0 20px 32px;
    border-top: 1px solid rgba(255,255,255,.1);
  }
  .settings-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: rgba(255,255,255,.2);
    margin: 12px auto 16px;
  }
  .settings-title {
    font-size: 16px; font-weight: 700;
    margin-bottom: 20px; text-align: center;
  }
  .setting-row { margin-bottom: 20px; }
  .setting-label {
    display: flex; justify-content: space-between;
    font-size: 14px; font-weight: 500; margin-bottom: 10px;
  }
  .setting-val {
    background: var(--accent); color: #fff;
    font-size: 12px; font-weight: 700;
    padding: 2px 10px; border-radius: 20px; min-width: 36px; text-align: center;
  }
  .seg-control {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    border-radius: 12px; overflow: hidden;
    border: 1px solid rgba(255,255,255,.1);
  }
  .seg-btn {
    padding: 11px 0; font-size: 15px; font-weight: 600;
    text-align: center; cursor: pointer;
    background: transparent; border: none; color: var(--muted);
    transition: background .15s, color .15s;
  }
  .seg-btn:not(:last-child) { border-right: 1px solid rgba(255,255,255,.1); }
  .seg-btn.active { background: var(--accent); color: #fff; }
  input[type="range"] {
    width: 100%; height: 4px;
    accent-color: var(--accent); cursor: pointer; border-radius: 2px;
  }
  .timer-labels {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--muted); margin-top: 6px;
  }
  .close-settings {
    width: 100%; padding: 14px;
    background: var(--card); border: 1px solid rgba(255,255,255,.1);
    color: var(--text); font-size: 15px; font-weight: 600;
    border-radius: 14px; cursor: pointer; margin-top: 8px;
  }

  /* ── Overlay backdrop for history ── */
  .hist-overlay {
    position: fixed; inset: 0; z-index: 19;
    display: none;
  }
  .hist-overlay.open { display: block; }

  /* ── Toast notification ── */
  .toast {
    position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid rgba(255,255,255,.12);
    color: var(--text); font-size: 13px; font-weight: 600;
    padding: 10px 20px; border-radius: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
    z-index: 50;
    opacity: 0; pointer-events: none;
    transition: opacity .2s;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }
  .toast.ok   { border-color: var(--ok); color: var(--ok); }
  .toast.err  { border-color: var(--err); color: var(--err); }
</style>
</head>
<body>

<div class="app">

  <!-- ── Header ── -->
  <header>
    <div class="logo">📋</div>
    <div class="header-text">
      <h1>Continental</h1>
      <span>Receipt Capture · Agent 1</span>
    </div>
    <button class="set-btn" id="setBtn">⚙ Settings</button>
  </header>

  <!-- ── Camera zone ── -->
  <div class="camera-zone" id="cameraZone">
    <video id="videoFeed" autoplay playsinline muted></video>
    <img id="previewImg" alt="Preview">
    <canvas id="snapCanvas"></canvas>

    <div class="countdown-overlay" id="countdownOverlay">
      <span class="countdown-num" id="countdownNum"></span>
    </div>
    <div class="flash-el" id="flashEl"></div>
    <div class="cam-badge" id="camBadge">● LIVE</div>

    <!-- Receipt corner guides -->
    <div class="guide guide-tl"></div>
    <div class="guide guide-tr"></div>
    <div class="guide guide-bl"></div>
    <div class="guide guide-br"></div>
  </div>

  <!-- ── Bottom bar ── -->
  <div class="bottom-bar">
    <button class="side-btn" id="retakeBtn" disabled>↩ Retake</button>

    <button class="shutter-outer" id="shutterBtn" disabled>
      <div class="shutter-inner"></div>
    </button>

    <button class="side-btn" id="uploadBtn" disabled>Upload ✓</button>
  </div>

</div><!-- .app -->

<!-- History trigger FAB -->
<button class="history-trigger" id="histTrigger" title="Upload history">
  🧾
  <span class="hist-count" id="histCount">0</span>
</button>

<!-- History panel (bottom sheet) -->
<div class="hist-overlay" id="histOverlay"></div>
<div class="history-panel" id="histPanel">
  <div class="history-handle"></div>
  <div class="history-title">
    Upload History
    <button class="history-close" id="histClose">✕</button>
  </div>
  <div class="history-scroll" id="historyList">
    <div id="histPlaceholder" style="font-size:13px;color:var(--muted);text-align:center;padding:16px 0">
      No uploads yet this session.
    </div>
  </div>
</div>

<!-- Settings bottom sheet -->
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-sheet">
    <div class="settings-handle"></div>
    <div class="settings-title">⚙ Camera Settings</div>

    <div class="setting-row">
      <div class="setting-label">
        <span>📍 Zoom Level</span>
      </div>
      <div class="seg-control" id="zoomSeg">
        <button class="seg-btn active" data-zoom="1">1×</button>
        <button class="seg-btn"        data-zoom="2">2×</button>
        <button class="seg-btn"        data-zoom="3">3×</button>
      </div>
    </div>

    <div class="setting-row">
      <div class="setting-label">
        <span>⏱ Shutter Delay</span>
        <span class="setting-val" id="timerLabel">3 s</span>
      </div>
      <input type="range" id="timerSlider" min="0" max="1" step="1" value="0">
      <div class="timer-labels"><span>3 sec</span><span>5 sec</span></div>
    </div>

    <button class="close-settings" id="closeSettings">Done</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
const S = {
  stream: null, videoTrack: null,
  zoomLevel: 1, timerSeconds: 3,
  capturedBlob: null, uploading: false,
  uploadCount: 0,
};

// ── DOM ──────────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const video          = $('videoFeed');
const previewImg     = $('previewImg');
const snapCanvas     = $('snapCanvas');
const countdownOverlay = $('countdownOverlay');
const countdownNum   = $('countdownNum');
const flashEl        = $('flashEl');
const camBadge       = $('camBadge');
const shutterBtn     = $('shutterBtn');
const retakeBtn      = $('retakeBtn');
const uploadBtn      = $('uploadBtn');
const zoomSeg        = $('zoomSeg');
const timerSlider    = $('timerSlider');
const timerLabel     = $('timerLabel');
const setBtn         = $('setBtn');
const settingsOverlay= $('settingsOverlay');
const closeSettings  = $('closeSettings');
const histTrigger    = $('histTrigger');
const histPanel      = $('histPanel');
const histOverlay    = $('histOverlay');
const histClose      = $('histClose');
const histCount      = $('histCount');
const toastEl        = $('toast');

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = '', dur = 2800) {
  toastEl.textContent = msg;
  toastEl.className = `toast show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.className = 'toast', dur);
}

// ── Audio engine ─────────────────────────────────────────────────────────────
const ctx = new (window.AudioContext || window.webkitAudioContext)();

function playTick() {
  // Mechanical tick sound — sharp click
  if (ctx.state === 'suspended') ctx.resume();
  const buf = ctx.createBuffer(1, ctx.sampleRate * 0.05, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.004));
  }
  const src  = ctx.createBufferSource();
  const gain = ctx.createGain();
  src.buffer = buf;
  src.connect(gain); gain.connect(ctx.destination);
  gain.gain.value = 0.6;
  src.start();
}

function playShutter() {
  // Camera shutter — two-part mechanical sound
  if (ctx.state === 'suspended') ctx.resume();
  // Part 1: click
  const makeNoise = (startTime, gainVal, decay) => {
    const buf  = ctx.createBuffer(1, ctx.sampleRate * 0.06, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++)
      data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * decay));
    const src  = ctx.createBufferSource();
    const gain = ctx.createGain();
    src.buffer = buf;
    src.connect(gain); gain.connect(ctx.destination);
    gain.gain.value = gainVal;
    src.start(startTime);
  };
  makeNoise(ctx.currentTime,       0.8, 0.003);
  makeNoise(ctx.currentTime + 0.06, 0.5, 0.006);
}

function playSuccess() {
  if (ctx.state === 'suspended') ctx.resume();
  [[523, 0, 80], [659, 0.1, 80], [784, 0.2, 120]].forEach(([freq, delay, dur]) => {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine'; o.frequency.value = freq;
    const t = ctx.currentTime + delay;
    g.gain.setValueAtTime(0.3, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur / 1000);
    o.start(t); o.stop(t + dur / 1000);
  });
}

function playError() {
  if (ctx.state === 'suspended') ctx.resume();
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.type = 'sawtooth'; o.frequency.value = 220;
  g.gain.setValueAtTime(0.3, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
  o.start(); o.stop(ctx.currentTime + 0.3);
}

// Prime audio context on first user gesture
document.addEventListener('touchstart', () => ctx.resume(), { once: true });
document.addEventListener('click',      () => ctx.resume(), { once: true });

// ── Camera init ───────────────────────────────────────────────────────────────
async function startCamera() {
  try {
    S.stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width:  { ideal: 4032 },
        height: { ideal: 3024 },
      },
      audio: false,
    });
    video.srcObject = S.stream;
    S.videoTrack = S.stream.getVideoTracks()[0];
    await video.play();
    shutterBtn.disabled = false;
    setMode('live');
    applyZoom(S.zoomLevel);
    const set = S.videoTrack.getSettings();
    camBadge.textContent = '● LIVE';
  } catch (err) {
    camBadge.textContent = '✗ No Camera';
    camBadge.style.color = 'var(--err)';
    showToast(`Camera error: ${err.name}`, 'err', 5000);
  }
}

// ── Mode: live ↔ preview ──────────────────────────────────────────────────────
function setMode(mode) {
  if (mode === 'live') {
    video.style.display      = 'block';
    previewImg.style.display = 'none';
    camBadge.textContent     = '● LIVE';
    camBadge.className       = 'cam-badge';
    shutterBtn.disabled      = false;
    retakeBtn.disabled       = true;
    uploadBtn.disabled       = true;
  } else {
    video.style.display      = 'none';
    previewImg.style.display = 'block';
    camBadge.textContent     = '📸 PREVIEW — tap Upload or Retake';
    camBadge.className       = 'cam-badge preview';
    shutterBtn.disabled      = true;
    retakeBtn.disabled       = false;
    uploadBtn.disabled       = false;
  }
}

// ── Zoom ──────────────────────────────────────────────────────────────────────
async function applyZoom(level) {
  if (!S.videoTrack) return;
  try {
    const caps = S.videoTrack.getCapabilities();
    if (caps.zoom) {
      await S.videoTrack.applyConstraints({ advanced: [{ zoom: Math.min(level, caps.zoom.max) }] });
    }
  } catch (_) {}
}

zoomSeg.querySelectorAll('.seg-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    zoomSeg.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    S.zoomLevel = parseFloat(btn.dataset.zoom);
    applyZoom(S.zoomLevel);
  });
});

const TIMERS = [3, 5];
timerSlider.addEventListener('input', () => {
  S.timerSeconds = TIMERS[parseInt(timerSlider.value)];
  timerLabel.textContent = `${S.timerSeconds} s`;
});

// ── Settings popup ────────────────────────────────────────────────────────────
setBtn.addEventListener('click', () => settingsOverlay.classList.add('open'));
closeSettings.addEventListener('click', () => settingsOverlay.classList.remove('open'));
settingsOverlay.addEventListener('click', e => {
  if (e.target === settingsOverlay) settingsOverlay.classList.remove('open');
});

// ── History panel ─────────────────────────────────────────────────────────────
histTrigger.addEventListener('click', () => {
  histPanel.classList.add('open');
  histOverlay.classList.add('open');
});
const closeHist = () => {
  histPanel.classList.remove('open');
  histOverlay.classList.remove('open');
};
histClose.addEventListener('click', closeHist);
histOverlay.addEventListener('click', closeHist);

// ── Shutter ───────────────────────────────────────────────────────────────────
shutterBtn.addEventListener('click', async () => {
  if (S.uploading) return;
  ctx.resume();
  shutterBtn.disabled = true;
  shutterBtn.classList.add('counting');
  countdownOverlay.classList.add('active');

  for (let i = S.timerSeconds; i >= 1; i--) {
    countdownNum.textContent = i;
    playTick();
    await sleep(1000);
  }

  countdownOverlay.classList.remove('active');
  shutterBtn.classList.remove('counting');

  // Capture visible crop (matches object-fit:cover display)
  const zone = $('cameraZone');
  const boxW = zone.clientWidth;
  const boxH = zone.clientHeight;
  const rawW = video.videoWidth  || boxW;
  const rawH = video.videoHeight || boxH;
  const boxAR = boxW / boxH;
  const rawAR = rawW / rawH;

  let sx, sy, sw, sh;
  if (rawAR > boxAR) {
    sh = rawH; sw = rawH * boxAR; sx = (rawW - sw) / 2; sy = 0;
  } else {
    sw = rawW; sh = rawW / boxAR; sx = 0; sy = (rawH - sh) / 2;
  }

  const scale = Math.min(window.devicePixelRatio || 1, 2);
  snapCanvas.width  = boxW * scale;
  snapCanvas.height = boxH * scale;
  snapCanvas.getContext('2d').drawImage(video, sx, sy, sw, sh, 0, 0, snapCanvas.width, snapCanvas.height);

  // Flash + sound
  flashEl.classList.add('pop');
  setTimeout(() => flashEl.classList.remove('pop'), 120);
  playShutter();

  snapCanvas.toBlob(blob => {
    if (!blob) { setMode('live'); showToast('Capture failed — try again', 'err'); return; }
    S.capturedBlob = blob;
    if (previewImg.src) URL.revokeObjectURL(previewImg.src);
    previewImg.src = URL.createObjectURL(blob);
    setMode('preview');
    showToast('Photo captured — review and tap Upload');
  }, 'image/jpeg', 0.93);
});

// ── Retake ────────────────────────────────────────────────────────────────────
retakeBtn.addEventListener('click', () => {
  if (previewImg.src) URL.revokeObjectURL(previewImg.src);
  S.capturedBlob = null;
  setMode('live');
});

// ── Upload ────────────────────────────────────────────────────────────────────
uploadBtn.addEventListener('click', async () => {
  if (!S.capturedBlob || S.uploading) return;
  S.uploading = true;
  uploadBtn.disabled  = true;
  retakeBtn.disabled  = true;
  showToast('☁ Uploading to Drive…');

  const fd = new FormData();
  fd.append('photo', S.capturedBlob, `receipt_${Date.now()}.jpg`);

  try {
    const res  = await fetch('/upload', { method: 'POST', body: fd });
    const data = await res.json();

    if (data.success) {
      playSuccess();
      addHistoryItem(data);
      if (previewImg.src) URL.revokeObjectURL(previewImg.src);
      S.capturedBlob = null;
      setMode('live');
      showToast(data.dryRun ? '✓ Dry-run complete' : '✓ Receipt saved to Drive!', 'ok');
    } else {
      throw new Error(data.hint || data.error || 'Upload failed');
    }
  } catch (err) {
    playError();
    showToast(`✗ ${err.message}`, 'err', 5000);
    retakeBtn.disabled = false;
    uploadBtn.disabled = false;
  } finally {
    S.uploading = false;
  }
});

// ── History ───────────────────────────────────────────────────────────────────
function addHistoryItem(data) {
  $('histPlaceholder')?.remove();
  S.uploadCount++;
  histCount.textContent = S.uploadCount;
  histCount.classList.add('show');

  const item = document.createElement('div');
  item.className = 'hist-item';
  item.innerHTML = `
    <span class="hist-icon">🧾</span>
    <div class="hist-info">
      <div class="hist-name">${data.fileName || 'receipt'}</div>
      <div class="hist-meta">${new Date().toLocaleTimeString()} · ${data.rowId?.slice(0,8) || '—'}</div>
    </div>
    <span class="hist-badge ${data.dryRun ? '' : 'ok'}">${data.dryRun ? 'DRY RUN' : '✓ SYNCED'}</span>`;
  $('historyList').prepend(item);
}

// ── Util ──────────────────────────────────────────────────────────────────────
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── Boot ──────────────────────────────────────────────────────────────────────
setMode('live');
startCamera();
</script>
</body>
</html>
